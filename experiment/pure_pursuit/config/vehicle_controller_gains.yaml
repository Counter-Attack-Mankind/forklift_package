controller_0:  #changed
  K_e: 15.0
  K_yaw: 1.8
  ff_lead_time: 0.0

  # 每个控制器使用不同的控制参数
  #--------------------------------------------------------
  # 先调横向再调纵向，横向调整的是lookahead_scale
  # 车切弯过晚，将前瞻系数调小。若车左右摆动，转向敏感，则调大前瞻系数
  #--------------------------------------------------------
  # 若车明显落后参考轨迹，则增大kp，若车冲过头则减小kp
  #--------------------------------------------------------
  lookahead_scale: 1.8
  longitude_kp: 2.0
  longitude_ki: 0.1

